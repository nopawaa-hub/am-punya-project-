<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papan Markah Interaktif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0fdf4; /* Light green background */
        }
        /* Hide scrollbar for cleaner look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        .score-pop {
            animation: pop 0.3s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: #22c55e; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-8">

    <div class="w-full max-w-5xl">
        <div class="text-center mb-10">
            <h1 class="text-4xl sm:text-5xl font-extrabold text-green-800 drop-shadow-sm mb-2">Papan Markah Kuiz</h1>
            <p class="text-green-700 text-lg sm:text-xl font-medium">Jawab betul: <span class="font-bold bg-green-200 px-2 py-1 rounded">+5 Mata</span></p>
        </div>

        <!-- Grid for 4 Groups -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 gap-6 sm:gap-8" id="scoreboard-container">
            <!-- Cards will be generated by JavaScript -->
        </div>

        <div class="mt-12 text-center flex justify-center gap-4">
            <button onclick="resetSemua()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-6 rounded-xl shadow-sm transition transform hover:scale-105 active:scale-95 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                Reset Semua
            </button>
        </div>
    </div>

    <script>
        // Initial state for 4 groups
        let scores = [0, 0, 0, 0];
        let names = ["Kumpulan 1", "Kumpulan 2", "Kumpulan 3", "Kumpulan 4"];
        
        // Colors for each group card to make it lively
        const colors = [
            { bg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-700', btn: 'bg-blue-600 hover:bg-blue-700', shadow: 'shadow-blue-100' },
            { bg: 'bg-red-50', border: 'border-red-200', text: 'text-red-700', btn: 'bg-red-600 hover:bg-red-700', shadow: 'shadow-red-100' },
            { bg: 'bg-yellow-50', border: 'border-yellow-200', text: 'text-yellow-700', btn: 'bg-yellow-500 hover:bg-yellow-600', shadow: 'shadow-yellow-100' },
            { bg: 'bg-purple-50', border: 'border-purple-200', text: 'text-purple-700', btn: 'bg-purple-600 hover:bg-purple-700', shadow: 'shadow-purple-100' }
        ];

        function renderScoreboard() {
            const container = document.getElementById('scoreboard-container');
            container.innerHTML = '';

            for (let i = 0; i < 4; i++) {
                const c = colors[i];
                const cardHTML = `
                    <div class="${c.bg} border-2 ${c.border} rounded-2xl shadow-lg ${c.shadow} p-6 sm:p-8 flex flex-col items-center justify-between transition transform hover:-translate-y-1">
                        
                        <!-- Editable Group Name -->
                        <h2 class="text-2xl sm:text-3xl font-bold ${c.text} mb-2 text-center w-full focus:outline-none focus:border-b-2 focus:border-${c.text.split('-')[1]}-400" 
                            contenteditable="true" 
                            onblur="updateName(${i}, this.innerText)"
                            spellcheck="false">
                            ${names[i]}
                        </h2>
                        
                        <!-- Score Display -->
                        <div id="score-display-${i}" class="text-7xl sm:text-8xl font-black text-gray-800 my-6 tracking-tighter">
                            ${scores[i]}
                        </div>
                        
                        <!-- Controls -->
                        <div class="flex gap-3 w-full">
                            <button onclick="ubahMarkah(${i}, -5)" class="flex-1 bg-white border-2 border-gray-200 hover:bg-gray-50 text-gray-600 font-bold py-3 rounded-xl shadow-sm transition active:scale-95 text-lg">
                                -5
                            </button>
                            <button onclick="ubahMarkah(${i}, 5)" class="flex-[2] ${c.btn} text-white font-bold py-3 rounded-xl shadow-md transition active:scale-95 text-xl flex items-center justify-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                                </svg>
                                5 Mata
                            </button>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            }
        }

        function ubahMarkah(index, nilai) {
            scores[index] += nilai;
            
            // Prevent negative scores if you want (uncomment the line below)
            // if (scores[index] < 0) scores[index] = 0;

            const scoreElement = document.getElementById(`score-display-${index}`);
            scoreElement.innerText = scores[index];
            
            // Add pop animation
            scoreElement.classList.remove('score-pop');
            void scoreElement.offsetWidth; // trigger reflow
            scoreElement.classList.add('score-pop');
        }

        function updateName(index, newName) {
            names[index] = newName.trim();
        }

        function resetSemua() {
            if(confirm("Adakah anda pasti mahu set semula semua markah kepada 0?")) {
                scores = [0, 0, 0, 0];
                renderScoreboard();
            }
        }

        // Initialize the app
        renderScoreboard();
    </script>
</body>
</html>
